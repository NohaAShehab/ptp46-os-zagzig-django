{% extends 'base.html' %}

{% block body %}
  <section class="section" aria-label="Students list">
    <div class="section-head">
      <h2>Students</h2>
      <p class="lead-small">Browse student profiles and open details.</p>
    </div>

    <div class="panel">
      <div class="table-wrap" role="region" aria-label="Students table">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width: 90px;">ID</th>
              <th>Student Name</th>
              <th>Track</th>
              <th style="width: 160px;">Salary</th>
              <th class="row-actions" style="width: 140px;">Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for student in students %}
              <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.track }}</td>
                <td>{{ student.salary }}</td>
                <td class="row-actions">
                  <a
                    class="btn"
                    href="{% url 'students.profile' student.id %}"
                    aria-label="Open student profile {{ student.name }}"
                  >
                    Show
                  </a>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </section>
{% endblock %}
