{% extends 'base.html' %}

{% block body %}
  <section class="section" aria-label="Students list">
    <div class="section-head">
      <div>
        <h2>Students</h2>
        <p class="lead-small">Browse student profiles and open details.</p>
      </div>
      <a class="btn btn-primary" href="{% url 'students.create' %}">Create Student</a>
    </div>

    <div class="panel">
      <div class="table-wrap" role="region" aria-label="Students table">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width: 90px;">ID</th>
              <th>Student Name</th>
              <th>Email</th>
              <th style="width: 160px;">Age</th>
              <th class="row-actions" style="width: 140px;">Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for student in students %}
              <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.email }}</td>
                <td>{{ student.age }}</td>
<!--                <td> {{student.show_url }}</td>-->
                <td class="row-actions">
                  <a
                    class="btn"
                    href="{{student.show_url}}"
                    aria-label="Open student profile {{ student.name }}"
                  >
                    Show
                  </a>
                   <a
                    class="btn"
                    href="{{student.delete_url}}">
                    Delete
                  </a>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </section>
{% endblock %}
