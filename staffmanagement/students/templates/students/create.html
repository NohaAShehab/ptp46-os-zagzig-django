{% extends 'base.html' %}

{% block body %}
  <section class="section" aria-label="Create student">
    <style>
      /* Make the browser file chooser match the rest of the inputs */
      .file-input {
        padding: 10px 12px !important;
      }

      .file-input::file-selector-button {
        margin-right: 12px;
        padding: 10px 12px;
        border-radius: calc(var(--radius) - 6px);
        border: 1px solid var(--border);
        background: linear-gradient(
          135deg,
          rgba(37, 99, 235, 0.22),
          rgba(37, 99, 235, 0.08)
        );
        font-weight: 800;
        color: var(--text);
      }
    </style>

    <div class="section-head">
      <div>
        <h2>Create Student</h2>
        <p class="lead-small">Add a new student profile to the list.</p>
      </div>
      <a class="btn" href="{% url 'students.index' %}">Back to Students</a>
    </div>

    <div class="panel reveal" style="padding: 20px;">
      {% if error %}
        <div class="kv" style="margin-bottom: 16px;">
          <div class="kv-label">Validation</div>
          <div class="kv-value">{{ error }}</div>
        </div>
      {% endif %}

      <form method="post" action="" aria-label="Create student form" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="profile-grid">
          <div>
            <label class="kv-label" for="name">Name</label>
            <input class="input" id="name" name="name" type="text" placeholder="Student name" required />
          </div>
          <div>
            <label class="kv-label" for="email">Email</label>
            <input class="input" id="email" name="email" type="email" placeholder="student@example.com" required />
          </div>
          <div>
            <label class="kv-label" for="age">Age</label>
            <input class="input" id="age" name="age" type="number" min="1" placeholder="18" />
          </div>
          <div>
            <label class="kv-label" for="grade">Grade</label>
            <input class="input" id="grade" name="grade" type="number" min="0" placeholder="0" />
          </div>
          <div>
            <label class="kv-label" for="gender">Gender</label>
            <select class="input" id="gender" name="gender">
              <option value="m">Male</option>
              <option value="f">Female</option>
            </select>
          </div>
          <div>
            <label class="kv-label" for="image">Image filename</label>
            <input class="input file-input" id="image" name="image" type="file" accept="image/*" />
          </div>
        </div>

        <div style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap;">
          <button class="btn btn-primary" type="submit">Create Student</button>
          <a class="btn" href="{% url 'students.index' %}">Cancel</a>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
